name: Daily HiFleet Weather Sync

on:
  schedule:
    - cron: '50 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch email and generate dashboard
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_AUTH: ${{ secrets.EMAIL_AUTH }}
        run: |
          pip install imap-tools openpyxl jinja2 requests
          python fetch_and_generate.py
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
